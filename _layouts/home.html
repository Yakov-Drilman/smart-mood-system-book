<!doctype html>

<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- <link
      rel="stylesheet"
      href="{{ '/assets/css/style.css' | relative_url }}"
    /> -->

    <link rel="stylesheet" href="{{ '/assets/css/home.css' | relative_url }}" />

    <title>{{ page.title }}</title>
  </head>

  <body class="home-layout">
    <!-- Desktop Navigation -->
    <header class="top-nav">
      <div class="logo">
        <a href="#hero"><img src="/assets/images/logo.png" alt="logo" /></a>
      </div>

      <nav class="desktop-nav">
        <a href="#about">אודות</a>
        <a href="#vision">חזון</a>
        <a href="#journey">ספר המסע</a>
        <a href="#build-log">יומן פיתוח</a>
        <a href="{{ site.github.repository_url }}">GitHub</a>
      </nav>
    </header>

    <!-- Mobile Header -->
    <div class="mobile-header">
      <span class="mobile-title"> 📘 Smart Mood System </span>

      <button
        class="menu-toggle"
        onclick="toggleHomeMenu()"
        aria-label="פתח תפריט"
      >
        ☰
      </button>
    </div>

    <!-- Mobile Menu -->
    <div class="home-mobile-menu" id="homeMenu">
      <a href="#about" onclick="toggleHomeMenu()"> אודות </a>

      <a href="#vision" onclick="toggleHomeMenu()"> חזון </a>

      <a href="#journey" onclick="toggleHomeMenu()"> ספר המסע </a>

      <a href="#build_log" onclick="toggleHomeMenu()"> יומן פיתוח </a>

      <a href="{{ site.github.repository_url }}"> GitHub </a>
    </div>

    <!-- Mobile Backdrop -->
    <div class="backdrop" id="backdrop" onclick="toggleHomeMenu()"></div>

    <!-- Page Content -->
    {{ content }}

    <script>
      function toggleHomeMenu() {
        document.getElementById("homeMenu").classList.toggle("open");
        document.getElementById("backdrop").classList.toggle("show");
      }
    </script>
  </body>
</html>
